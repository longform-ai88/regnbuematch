<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Regnbuematch</title>
  <style>
    :root {
      --pink: #ff7eb3;
      --teal: #65d6ce;
      --white: #ffffff;
      --glass: rgba(255,255,255,0.16);
      --success: #d8ffd8;
      --error: #ffd7d7;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--pink), var(--teal));
      color: var(--white);
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .header {
      width: 100%;
      text-align: center;
      font-weight: 700;
      padding-top: env(safe-area-inset-top);
      letter-spacing: 0.4px;
    }

    .stack {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px 0;
    }

    .card {
      position: absolute;
      width: min(92vw, 390px);
      height: min(72vh, 620px);
      border-radius: 30px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: transform 0.25s ease, opacity 0.25s ease;
      user-select: none;
      will-change: transform;
    }

    .card.back {
      transform: scale(0.96) translateY(14px);
      opacity: 0.7;
    }

    .photo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(0,0,0,0.12));
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 22px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.45));
    }

    .name {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .bio {
      margin: 10px 0 0;
      font-size: 1rem;
      line-height: 1.45;
      opacity: 0.96;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .labels {
      position: absolute;
      top: 18px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 18px;
      pointer-events: none;
      z-index: 2;
    }

    .label {
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      border: 3px solid;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .like {
      color: #b7ffcc;
      border-color: #b7ffcc;
      transform: rotate(12deg);
    }

    .nope {
      color: #ffd3d3;
      border-color: #ffd3d3;
      transform: rotate(-12deg);
    }

    .actions {
      display: flex;
      gap: 14px;
      padding: 8px 0 6px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      cursor: pointer;
      touch-action: manipulation;
    }

    .skip {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,0.94);
      color: #ff5d7a;
      padding: 0;
      font-size: 1.4rem;
    }

    .likeBtn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      color: #19b56b;
      padding: 0;
      font-size: 1.4rem;
    }

    .buy-section {
      width: 100%;
      max-width: 420px;
      background: rgba(0,0,0,0.22);
      padding: 22px 20px;
      border-radius: 24px;
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      margin-top: 10px;
      margin-bottom: calc(12px + env(safe-area-inset-bottom));
    }

    .buy-section h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .buy-section p {
      margin: 0 0 12px;
      line-height: 1.45;
      opacity: 0.95;
    }

    .price {
      font-size: 2.4rem;
      font-weight: 800;
      margin: 8px 0 16px;
    }

    .buy-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      background: white;
      color: black;
      cursor: pointer;
    }

    .small-link {
      display: inline-block;
      margin-top: 10px;
      color: white;
      text-decoration: underline;
      font-size: 0.95rem;
      opacity: 0.92;
    }

    .signup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, var(--pink), var(--teal));
    }

    .signup.active {
      display: flex;
    }

    .signup-box {
      width: 100%;
      max-width: 420px;
      background: rgba(0,0,0,0.22);
      padding: 28px 22px;
      border-radius: 24px;
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .signup-box h2 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .signup-box p {
      margin: 0 0 18px;
      line-height: 1.45;
    }

    .signup-box input {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    .signup-box button {
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      background: white;
      color: black;
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 700;
    }

    .success { color: var(--success); }
    .error { color: var(--error); }

    @media (min-width: 700px) {
      .app {
        max-width: 480px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">Regnbuematch 🌈</div>

    <div class="stack">
      <div class="card back" id="backCard"></div>

      <div class="card" id="card">
        <div class="labels">
          <div class="label nope" id="nopeLabel">NOPE</div>
          <div class="label like" id="likeLabel">LIKE</div>
        </div>

        <div class="photo" id="photo">🌸</div>

        <div class="content">
          <h1 class="name" id="name">Emma, 24</h1>
          <p class="bio" id="bio">Elsker spontane roadtrips, kaffe om morgenen og lange turer ved sjøen.</p>
          <div class="chips" id="chips">
            <div class="chip">Coffee lover</div>
            <div class="chip">Beach walks</div>
            <div class="chip">Music</div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn skip" id="skipBtn">✕</button>
      <button class="btn likeBtn" id="likeBtn">♥</button>
    </div>

    <div class="buy-section">
      <h2>Get access</h2>
      <p>A simple way to discover new connections.</p>
      <div class="price">199 kr</div>
      <p>Secure checkout and instant access.</p>
      <button onclick="window.location.href='https://buy.stripe.com/aFaaEY3T73Um2Um52DfnO04'">
  Start Pro – 199 kr/mnd
</button>
      <a href="#waitlist" class="small-link" onclick="showWaitlist(event)">Join waitlist instead</a>
    </div>
  </div>

  <script>
    const profiles = [
      {
        photo: "😏",
        name: "Jonas, 25",
        bio: "Hei du. Hva ser du egentlig etter her inne? Jeg er litt nysgjerrig, skal ikke lyve.",
        chips: ["Flørtete", "Direkte", "Demo"]
      },
      {
        photo: "☕",
        name: "Sander, 27",
        bio: "Hvor er du fra? Og hva er sjansen for at du har god smak i kaffe og mennesker?",
        chips: ["Kaffe", "Small talk", "Demo"]
      },
      {
        photo: "🎧",
        name: "Malik, 24",
        bio: "Hva fikk deg til å swipe høyre? Jeg prøver å finne ut om vi har god kjemi eller bare god stil.",
        chips: ["Kjemi", "Nysgjerrig", "Demo"]
      },
      {
        photo: "🧠",
        name: "Emil, 26",
        bio: "Hei! Hva ser du etter her inne egentlig? Jeg liker folk som vet hva de vil, men fortsatt kan le litt.",
        chips: ["Seriøs", "God energi", "Demo"]
      },
      {
        photo: "🌊",
        name: "Noah, 23",
        bio: "Hvor er du fra? Jeg lover å ikke gjøre det til et intervju... med mindre du gjør det interessant.",
        chips: ["Rolig vibe", "Samtale", "Demo"]
      },
      {
        photo: "🕶️",
        name: "Adrian, 28",
        bio: "Hva fikk deg til å swipe høyre på meg? Vær ærlig — jeg tåler det.",
        chips: ["Selvironi", "Match", "Demo"]
      },
      {
        photo: "🎮",
        name: "Håkon, 24",
        bio: "Hei, hva ser du etter akkurat nå? Jeg er her for god prat, litt flørting og null drama.",
        chips: ["Flørt", "Null drama", "Demo"]
      },
      {
        photo: "📚",
        name: "Isak, 29",
        bio: "Hvor er du fra? Og hva gjør du når du faktisk liker noen på ekte?",
        chips: ["Rolig", "Ærlig", "Demo"]
      },
      {
        photo: "🔥",
        name: "Leo, 22",
        bio: "Hva fikk deg til å swipe høyre? Jeg håper det var mer enn bare et pent ansikt.",
        chips: ["Selv trygg", "Sjarmerende", "Demo"]
      },
      {
        photo: "🚲",
        name: "Martin, 30",
        bio: "Hei! Hva ser du etter her inne — noe lett, noe ekte, eller begge deler?",
        chips: ["Ekte", "Samtale", "Demo"]
      },
      {
        photo: "🎤",
        name: "Filip, 26",
        bio: "Hvor er du fra? Jeg spør bare fordi jeg liker en god start, ikke fordi jeg har tom for ideer.",
        chips: ["Isbryter", "Naturlig", "Demo"]
      },
      {
        photo: "🏝️",
        name: "Theo, 25",
        bio: "Hva fikk deg til å swipe høyre i dag? Jeg liker å vite hva som faktisk trekker folk inn.",
        chips: ["Nysgjerrig", "Match", "Demo"]
      },
      {
        photo: "💬",
        name: "Oliver, 27",
        bio: "Hei! Hva ser du etter i en samtale? Jeg håper på noe som føles lett, ekte og litt morsomt.",
        chips: ["Ekte", "Morsom", "Demo"]
      },
      {
        photo: "🌙",
        name: "Aksel, 23",
        bio: "Hvor er du fra? Og hva er den rareste, men beste måten noen har åpnet med deg på?",
        chips: ["Lekent", "Åpen", "Demo"]
      },
      {
        photo: "🎬",
        name: "Daniel, 28",
        bio: "Hva fikk deg til å swipe høyre? Jeg er mest ute etter god kjemi og en samtale som faktisk flyter.",
        chips: ["Kjemi", "Flyt", "Demo"]
      }
    ];

    let index = 0;
    let startX = 0;
    let currentX = 0;
    let dragging = false;

    const card = document.getElementById("card");
    const backCard = document.getElementById("backCard");
    const photo = document.getElementById("photo");
    const name = document.getElementById("name");
    const bio = document.getElementById("bio");
    const chips = document.getElementById("chips");
    const likeLabel = document.getElementById("likeLabel");
    const nopeLabel = document.getElementById("nopeLabel");
    const skipBtn = document.getElementById("skipBtn");
    const likeBtn = document.getElementById("likeBtn");
    const signup = document.getElementById("signup");
    const form = document.getElementById("form");
    const emailInput = document.getElementById("emailInput");
    const joinBtn = document.getElementById("joinBtn");
    const message = document.getElementById("message");

    function render() {
      const p = profiles[index % profiles.length];
      photo.textContent = p.photo;
      name.textContent = p.name;
      bio.textContent = p.bio;
      chips.innerHTML = p.chips.map(c => `<div class="chip">${c}</div>`).join("");

      const next = profiles[(index + 1) % profiles.length];
      backCard.innerHTML = `
        <div class="photo">${next.photo}</div>
        <div class="content">
          <h1 class="name">${next.name}</h1>
          <p class="bio">${next.bio}</p>
        </div>
      `;
    }

    function setTransform(x, rotate) {
      card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
      const opacity = Math.min(Math.abs(x) / 120, 1);
      likeLabel.style.opacity = x > 20 ? opacity : 0;
      nopeLabel.style.opacity = x < -20 ? opacity : 0;
    }

    function swipe(dir) {
      const width = window.innerWidth;
      const x = dir === "like" ? width : -width;
      const rotate = dir === "like" ? 18 : -18;

      card.style.transition = "transform 0.25s ease, opacity 0.25s ease";
      card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
      card.style.opacity = "0";

      setTimeout(() => {
        index++;
        card.style.transition = "transform 0.25s ease, opacity 0.25s ease";
        card.style.opacity = "1";
        card.style.transform = "translateX(0) rotate(0deg)";
        likeLabel.style.opacity = 0;
        nopeLabel.style.opacity = 0;
        render();
      }, 220);
    }

    card.addEventListener("touchstart", (e) => {
      dragging = true;
      startX = e.touches[0].clientX;
      currentX = startX;
      card.style.transition = "none";
    }, { passive: true });

    card.addEventListener("touchmove", (e) => {
      if (!dragging) return;
      currentX = e.touches[0].clientX;
      const diff = currentX - startX;
      setTransform(diff, diff / 16);
    }, { passive: true });

    card.addEventListener("touchend", () => {
      dragging = false;
      const diff = currentX - startX;

      if (diff > 90) swipe("like");
      else if (diff < -90) swipe("skip");
      else {
        card.style.transition = "transform 0.25s ease, opacity 0.25s ease";
        card.style.transform = "translateX(0) rotate(0deg)";
        likeLabel.style.opacity = 0;
        nopeLabel.style.opacity = 0;
      }
    });

    skipBtn.addEventListener("click", () => swipe("skip"));
    likeBtn.addEventListener("click", () => swipe("like"));

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const email = emailInput.value.trim();

      joinBtn.disabled = true;
      message.textContent = "Sending...";
      message.className = "message";

      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbzqPS4AtYL6UzCCACryvZ5zcGhrrmjmJuYFHYgycNlsvSw7-hey1knMOa12hKnEtRKhjw/exec", {
          method: "POST",
          body: new URLSearchParams({ email })
        });

        const text = await res.text();
        if (!res.ok) throw new Error(text || "Request failed");

        message.textContent = "Thanks! You're on the waitlist 🎉";
        message.className = "message success";
        emailInput.value = "";
      } catch (error) {
        console.error(error);
        message.textContent = "Something went wrong ❌";
        message.className = "message error";
      } finally {
        joinBtn.disabled = false;
      }
    });
    function goToCheckout() {
      alert("Checkout kommer snart");
    }

    function showWaitlist(event) {
      event.preventDefault();
      signup.classList.add("active");
    }

    render();    
  </script>
</body>
</html>
